<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>운행 기록</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap");

      :root {
        --bg: #f2f4f7;
        --surface: #ffffff;
        --border: #e5e7eb;
        --text-main: #111827;
        --text-sub: #6b7280;
        --accent: #2563eb;
        --danger: #ef4444;
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding-bottom: 120px;
      }

      .header {
        background: #ffffff;
        padding: 24px 20px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .header-car {
        font-size: 14px;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 4px;
      }
      .header-title {
        font-size: 22px;
        font-weight: 700;
      }
      .header-date {
        font-size: 13px;
        color: var(--text-sub);
        margin-top: 4px;
      }

      .prev-card {
        margin: 16px;
        background: var(--accent);
        color: white;
        padding: 20px;
        border-radius: var(--radius);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      }
      .prev-label {
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 4px;
      }
      .prev-value {
        font-size: 24px;
        font-weight: 700;
      }
      .prev-sub {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 8px;
      }

      /* 최초 등록 안내 배너 */
      .first-record-banner {
        margin: 0 16px 12px;
        padding: 14px 16px;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 12px;
        font-size: 13px;
        color: #92400e;
        line-height: 1.6;
      }

      .form-container {
        padding: 0 16px;
      }
      .field-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 18px;
        margin-bottom: 12px;
        border: 1px solid transparent;
        transition: border 0.2s;
      }
      .field-card.active-focus {
        border-color: var(--accent);
      }

      /* 비활성화된 카드 스타일 */
      .field-card.disabled {
        opacity: 0.4;
        pointer-events: none;
        user-select: none;
      }

      .field-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .req {
        color: var(--danger);
      }

      select,
      input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 16px;
        font-family: inherit;
        color: var(--text-main);
        background: transparent;
      }
      input[type="number"] {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        text-align: center;
      }
      input::placeholder {
        color: #d1d5db;
        font-weight: 400;
        font-size: 16px;
      }

      .toggle-group {
        display: flex;
        gap: 8px;
      }
      .toggle-btn {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: #fff;
        font-weight: 600;
        color: var(--text-sub);
        cursor: pointer;
        transition: 0.2s;
      }
      .toggle-btn.active {
        background: #eef2ff;
        border-color: var(--accent);
        color: var(--accent);
      }

      .bottom-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        background: linear-gradient(
          to top,
          rgba(242, 244, 247, 1) 80%,
          rgba(242, 244, 247, 0)
        );
      }
      .submit-btn {
        width: 100%;
        padding: 18px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 17px;
        font-weight: 700;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
      }
      .submit-btn:disabled {
        background: #d1d5db;
        box-shadow: none;
      }

      .loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.9);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .loading-overlay.show {
        display: flex;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .err-text {
        color: var(--danger);
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }
      .field-card.error {
        border-color: var(--danger);
      }
      .field-card.error .err-text {
        display: block;
      }
    </style>
  </head>
  <body>
    <script id="config-raw" type="application/json">
      <?!= configJson ?>
    </script>
    <script id="car-raw" type="text/plain">
      <?!= carNo ?>
    </script>
    <script id="prevodo-raw" type="application/json">
      <?!= prevOdoJson ?>
    </script>

    <div class="loading-overlay" id="overlay">
      <div class="spinner"></div>
      <p style="margin-top: 16px; font-weight: 600">데이터 저장 중...</p>
    </div>

    <div class="header">
      <div class="header-car" id="headerCar">차량번호 로딩중</div>
      <div class="header-title">운행 일지 작성</div>
      <div id="headerDate" class="header-date"></div>
    </div>

    <div class="prev-card">
      <div class="prev-label">직전 계기판 현황</div>
      <div class="prev-value" id="prevOdoDisplay">0 km</div>
      <div class="prev-sub" id="prevOdoSub">최근 기록을 불러오는 중입니다.</div>
    </div>

    <!-- 최초 등록 안내 배너 (기본 숨김, isFirst일 때만 표시) -->
    <div
      class="first-record-banner"
      id="firstRecordBanner"
      style="display: none"
    >
      <b>📋 최초 계기판 등록</b><br />
      이 차량의 첫 번째 기록입니다.<br />
      현재 계기판 수치만 입력하면 됩니다.
    </div>

    <div class="form-container" id="mainForm">
      <div class="field-card" id="fieldNameCard">
        <div class="field-label"><span class="req">*</span>운전자</div>
        <select id="selName" onchange="updateDept()">
          <option value="" disabled selected>운전자를 선택해 주세요.</option>
        </select>
        <div class="err-text">운전자를 선택해야 합니다.</div>
      </div>

      <div class="field-card" id="fieldDeptCard">
        <div class="field-label">소속 부서</div>
        <div id="deptDisplay" style="font-weight: 600; color: var(--accent)">
          운전자 선택 시 자동 입력
        </div>
      </div>

      <div class="field-card" id="fieldTypeCard">
        <div class="field-label"><span class="req">*</span>사용 구분</div>
        <div class="toggle-group">
          <button
            type="button"
            class="toggle-btn"
            id="btnCommute"
            onclick="selectType('출퇴근용')"
          >
            출퇴근
          </button>
          <button
            type="button"
            class="toggle-btn"
            id="btnBusiness"
            onclick="selectType('일반업무용')"
          >
            일반업무
          </button>
        </div>
      </div>

      <div class="field-card" id="fieldOdoCard">
        <div class="field-label">
          <span class="req">*</span>주행 후 현재 계기판 (km)
        </div>
        <input
          type="number"
          id="currentOdo"
          placeholder="000000"
          inputmode="numeric"
          oninput="validateOdo()"
        />
        <div id="odoErr" class="err-text">정확한 숫자를 입력해주세요.</div>
      </div>

      <div class="field-card" id="fieldNoteCard">
        <div class="field-label" id="noteLabel">비고 (선택사항)</div>
        <div id="noteGeneral">
          <input
            type="text"
            id="noteText"
            placeholder="특이사항을 적어주세요"
          />
        </div>
        <div id="noteCombo" style="display: none">
          <select id="noteSelect" style="margin-bottom: 10px">
            <option value="" selected>거래처를 선택하세요</option>
            <option value="__direct__">직접 입력하기</option>
          </select>
          <input
            type="text"
            id="noteDirectInput"
            placeholder="비고 직접 입력"
            style="
              display: none;
              border-bottom: 1px solid var(--border);
              padding: 8px 0;
            "
          />
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>
        기록 저장하기
      </button>
    </div>

    <div
      id="resultArea"
      style="display: none; padding: 40px 20px; text-align: center"
    >
      <div style="font-size: 60px; margin-bottom: 20px">✅</div>
      <h2 style="margin-bottom: 10px">저장 완료!</h2>
      <p style="color: var(--text-sub); margin-bottom: 30px">
        운행 기록이 성공적으로 전송되었습니다.
      </p>
      <div
        id="resultDetail"
        style="
          background: white;
          padding: 20px;
          border-radius: 16px;
          text-align: left;
          line-height: 1.8;
          font-size: 14px;
          border: 1px solid var(--border);
        "
      ></div>
      <button
        onclick="location.reload()"
        style="
          margin-top: 30px;
          background: none;
          border: none;
          color: var(--accent);
          font-weight: 600;
          text-decoration: underline;
        "
      >
        새로 작성하기
      </button>
    </div>

    <script>
      // ── 1. 초기 데이터 로드 및 전역 변수 설정 ───────────────────────
      const _CONFIG = JSON.parse(
        document.getElementById("config-raw").textContent,
      );
      const STAFF = _CONFIG.staff;
      const FIXED_USER = _CONFIG.fixedUser;
      const BUSINESS_TRIP_CARS = _CONFIG.businessTripCars;
      const CLIENTS = _CONFIG.clients || [];

      let carNo = document.getElementById("car-raw").textContent.trim();
      let prevOdo = null;
      let selectedType = "일반업무용";
      let isBusinessTrip = false;
      let isFirst = false; // 최초 기록 여부

      // ── 2. 초기화 로직 ──────────────────────────────────────────────
      window.onload = function () {
        // 날짜 표시
        const now = new Date();
        document.getElementById("headerDate").textContent =
          `${now.getFullYear()}. ${now.getMonth() + 1}. ${now.getDate()}. (${["일", "월", "화", "수", "목", "금", "토"][now.getDay()]})`;
        document.getElementById("headerCar").textContent =
          carNo || "차량 정보 없음";

        // 직전 계기판 데이터 주입
        const pData = JSON.parse(
          document.getElementById("prevodo-raw").textContent,
        );

        if (pData && pData.prevOdo) {
          // ── 일반 모드: 직전 기록 있음 ──
          prevOdo = Number(pData.prevOdo);
          document.getElementById("prevOdoDisplay").textContent =
            prevOdo.toLocaleString() + " km";
          document.getElementById("prevOdoSub").textContent = pData.prevDate
            ? "최근 기록: " + pData.prevDate
            : "최근 기록 없음";

          // 기본값을 직전 계기판 값으로 세팅
          document.getElementById("currentOdo").value = prevOdo;
        } else {
          // ── 최초 기록 모드: RAW 데이터에 이 차량 주행후 기록 없음 ──
          isFirst = true;

          document.getElementById("prevOdoDisplay").textContent = "최초 등록";
          document.getElementById("prevOdoSub").textContent =
            "새 차량이거나 기록이 없습니다.";

          // 안내 배너 표시
          document.getElementById("firstRecordBanner").style.display = "block";

          // 버튼 텍스트 변경
          document.getElementById("submitBtn").textContent = "초기값 등록하기";

          // 계기판 입력을 제외한 나머지 카드 전부 비활성화
          document.getElementById("fieldNameCard").classList.add("disabled");
          document.getElementById("fieldDeptCard").classList.add("disabled");
          document.getElementById("fieldTypeCard").classList.add("disabled");
          document.getElementById("fieldNoteCard").classList.add("disabled");
        }

        // 공용/고정 차량 UI 분기
        isBusinessTrip = BUSINESS_TRIP_CARS.includes(carNo);
        const fixed = FIXED_USER[carNo];
        const sel = document.getElementById("selName");

        if (fixed) {
          document.getElementById("fieldNameCard").style.display = "none";
          document.getElementById("deptDisplay").textContent =
            fixed.dept + " " + fixed.name;
        } else {
          STAFF.forEach((p) => {
            let opt = document.createElement("option");
            opt.value = p.name;
            opt.textContent = p.name;
            sel.appendChild(opt);
          });
        }

        // 방문 거래처 목록 (출장용 차량)
        if (isBusinessTrip) {
          document.getElementById("noteLabel").innerHTML =
            '방문 거래처 <span class="req">*</span>';
          document.getElementById("noteGeneral").style.display = "none";
          document.getElementById("noteCombo").style.display = "block";

          const noteSelect = document.getElementById("noteSelect");
          noteSelect.innerHTML =
            '<option value="" selected>거래처를 선택하세요</option>';

          CLIENTS.forEach((client) => {
            let opt = document.createElement("option");
            opt.value = client;
            opt.textContent = client;
            noteSelect.appendChild(opt);
          });

          let directOpt = document.createElement("option");
          directOpt.value = "__direct__";
          directOpt.textContent = "직접 입력하기";
          noteSelect.appendChild(directOpt);

          noteSelect.onchange = function () {
            document.getElementById("noteDirectInput").style.display =
              this.value === "__direct__" ? "block" : "none";
          };
        }

        selectType("일반업무용");
      };

      // ── 3. 이벤트 핸들러 및 유효성 검사 ────────────────────────────

      function updateDept() {
        const sel = document.getElementById("selName");
        const deptDisplay = document.getElementById("deptDisplay");
        const staffInfo = STAFF.find((s) => s.name === sel.value);

        if (staffInfo) {
          deptDisplay.textContent = staffInfo.dept;
          deptDisplay.style.color = "var(--accent)";
        } else {
          deptDisplay.textContent = "운전자 선택 시 자동 입력";
        }
      }

      function validateOdo() {
        const val = Number(document.getElementById("currentOdo").value);
        const card = document.getElementById("fieldOdoCard");
        const err = document.getElementById("odoErr");

        if (!val) {
          setBtnState(false);
          return;
        }

        // 최초 기록 모드: 값만 있으면 바로 통과
        if (isFirst) {
          card.classList.remove("error");
          setBtnState(true);
          return;
        }

        if (val < prevOdo) {
          err.textContent = `직전 기록(${prevOdo.toLocaleString()}km)보다 낮습니다.`;
          card.classList.add("error");
          setBtnState(false, "계기판 확인 필요");
        } else if (val === prevOdo) {
          err.textContent = `직전 기록과 같습니다. 주행 후 값을 입력해 주세요.`;
          card.classList.add("error");
          setBtnState(false, "주행 거리 확인");
        } else {
          card.classList.remove("error");
          setBtnState(true);
        }
      }

      function selectType(type) {
        selectedType = type;
        document
          .getElementById("btnCommute")
          .classList.toggle("active", type === "출퇴근용");
        document
          .getElementById("btnBusiness")
          .classList.toggle("active", type === "일반업무용");
      }

      function setBtnState(enabled, text) {
        const btn = document.getElementById("submitBtn");
        btn.disabled = !enabled;
        if (!isFirst) {
          btn.textContent = text || "기록 저장하기";
        }
      }

      // ── 4. 데이터 서버 전송 ─────────────────────────────────────────
      function submitForm() {
        const odoVal = Number(document.getElementById("currentOdo").value);

        if (!odoVal) {
          alert("계기판 수치를 입력해주세요.");
          return;
        }

        // 최초 기록 모드: 계기판 값만 전송, 나머지는 빈값
        if (isFirst) {
          document.getElementById("overlay").classList.add("show");
          google.script.run
            .withSuccessHandler((data) => {
              document.getElementById("overlay").classList.remove("show");
              if (data.success) {
                document.getElementById("mainForm").style.display = "none";
                document.querySelector(".prev-card").style.display = "none";
                document.querySelector(".header").style.display = "none";
                document.querySelector(".bottom-actions").style.display =
                  "none";
                document.getElementById("firstRecordBanner").style.display =
                  "none";

                document.getElementById("resultDetail").innerHTML = `
                  <b>차량:</b> ${carNo}<br>
                  <b>계기판 초기값:</b> ${odoVal.toLocaleString()} km
                `;
                document.getElementById("resultArea").style.display = "block";
              } else {
                alert("저장 실패: " + data.message);
              }
            })
            .saveRecord({
              carNo,
              name: "",
              dept: "",
              useType: "",
              currentOdo: odoVal,
              prevOdo: null, // null이면 백엔드에서 isFirst로 처리
              note: "",
            });
          return;
        }

        // 일반 기록 모드
        const fixed = FIXED_USER[carNo];
        const name = fixed
          ? fixed.name
          : document.getElementById("selName").value;
        const dept = fixed
          ? fixed.dept
          : STAFF.find((s) => s.name === name)?.dept;

        let note = "";
        if (isBusinessTrip) {
          const selVal = document.getElementById("noteSelect").value;
          note =
            selVal === "__direct__"
              ? document.getElementById("noteDirectInput").value
              : selVal;
          if (!note) {
            alert("방문 거래처를 입력/선택해주세요.");
            return;
          }
        } else {
          note = document.getElementById("noteText").value;
        }

        if (!name) {
          alert("운전자를 선택해주세요.");
          return;
        }

        document.getElementById("overlay").classList.add("show");

        google.script.run
          .withSuccessHandler((data) => {
            document.getElementById("overlay").classList.remove("show");
            if (data.success) {
              document.getElementById("mainForm").style.display = "none";
              document.querySelector(".prev-card").style.display = "none";
              document.querySelector(".header").style.display = "none";
              document.querySelector(".bottom-actions").style.display = "none";

              document.getElementById("resultDetail").innerHTML = `
                <b>차량:</b> ${carNo}<br>
                <b>운전자:</b> ${dept} ${name}<br>
                <b>주행후:</b> ${odoVal.toLocaleString()} km<br>
                <b>주행거리:</b> ${data.mileage} km
              `;
              document.getElementById("resultArea").style.display = "block";
            } else {
              alert("저장 실패: " + data.message);
            }
          })
          .saveRecord({
            carNo,
            name,
            dept,
            useType: selectedType,
            currentOdo: odoVal,
            prevOdo,
            note,
          });
      }
    </script>
  </body>
</html>
